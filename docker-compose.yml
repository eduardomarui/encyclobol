services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: encyclobol-web-dev
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0
